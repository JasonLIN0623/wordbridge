<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="WordBridge 是結合英文構詞與日文情境句的互動式語言學習網站。"
    />
    <title>WordBridge｜英日語言學習</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles.css" />
    <script src="./data/english-lessons.js" defer></script>
    <script src="./data/japanese-lessons.js" defer></script>
    <script src="./app.js" defer></script>
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <a class="brand" href="#dashboard" data-route="dashboard" aria-label="WordBridge 首頁">
          <span class="brand-mark">W</span>
          <span>
            <strong>WordBridge</strong>
            <small>每天跨過一座語言橋</small>
          </span>
        </a>

        <nav class="main-nav" aria-label="主要導覽">
          <button class="nav-item is-active" type="button" data-route="dashboard">
            <span aria-hidden="true">⌂</span>今日學習
          </button>
          <button class="nav-item" type="button" data-route="english">
            <span aria-hidden="true">A</span>英文拆字
          </button>
          <button class="nav-item" type="button" data-route="japanese">
            <span aria-hidden="true">あ</span>日文課程
          </button>
          <button class="nav-item" type="button" data-route="quiz">
            <span aria-hidden="true">✓</span>挑戰測驗
          </button>
          <button class="nav-item" type="button" data-route="progress">
            <span aria-hidden="true">↗</span>學習進度
          </button>
        </nav>

        <div class="sidebar-tip">
          <span aria-hidden="true">💡</span>
          <p><strong>今日小提醒</strong>把單字拆成小零件，比死背整個單字更容易記住。</p>
        </div>
      </aside>

      <main class="main-content">
        <header class="topbar">
          <button class="mobile-brand" type="button" data-route="dashboard">
            <span class="brand-mark">W</span>
            <strong>WordBridge</strong>
          </button>
          <div class="topbar-actions">
            <div class="streak-pill" title="連續學習天數">
              <span aria-hidden="true">🔥</span>
              <strong id="header-streak">0</strong>
              <span>天</span>
            </div>
            <button class="avatar" type="button" data-route="progress" aria-label="查看學習進度">
              學
            </button>
          </div>
        </header>

        <div id="view-root" class="view-root" aria-live="polite"></div>

        <nav class="mobile-nav" aria-label="手機版主要導覽">
          <button class="mobile-nav-item is-active" type="button" data-route="dashboard">
            <span aria-hidden="true">⌂</span><small>首頁</small>
          </button>
          <button class="mobile-nav-item" type="button" data-route="english">
            <span aria-hidden="true">A</span><small>英文</small>
          </button>
          <button class="mobile-nav-item" type="button" data-route="japanese">
            <span aria-hidden="true">あ</span><small>日文</small>
          </button>
          <button class="mobile-nav-item" type="button" data-route="quiz">
            <span aria-hidden="true">✓</span><small>測驗</small>
          </button>
          <button class="mobile-nav-item" type="button" data-route="progress">
            <span aria-hidden="true">↗</span><small>進度</small>
          </button>
        </nav>
      </main>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
  </body>
</html>
